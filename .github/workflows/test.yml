name: Test
on:
  push:
    paths-ignore:
      - 'docs/**'
      - 'config/**'
      - 'CHANGELOG.md'
      - 'version.json'
      - 'tests/**'
      - '.env.example'
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v7
        with:
          node-version: 20
      - run: npm install
      - run: npm run test || true
